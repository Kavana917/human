<!DOCTYPE html>
<html>
<head>
    <title>6-Axis 3D Visualizer</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #00ff00; font-family: monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .val { color: #fff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h2>IMU LIVE TELEMETRY</h2>
        <div>ACCEL X/Y/Z: <span id="acc" class="val">0, 0, 0</span></div>
        <div>GYRO X/Y/Z: <span id="gyro" class="val">0, 0, 0</span></div>
        <hr>
        <div>PITCH: <span id="p_val" class="val">0</span>°</div>
        <div>ROLL: <span id="r_val" class="val">0</span>°</div>
    </div>

    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Create the "ESP32 Board" in 3D
        const geometry = new THREE.BoxGeometry(3.5, 0.4, 2);
        const materials = [
            new THREE.MeshBasicMaterial({color: 0xff0000}), // Right
            new THREE.MeshBasicMaterial({color: 0xff8800}), // Left
            new THREE.MeshBasicMaterial({color: 0x0000ff}), // Top
            new THREE.MeshBasicMaterial({color: 0x555555}), // Bottom
            new THREE.MeshBasicMaterial({color: 0x00ff00}), // Front
            new THREE.MeshBasicMaterial({color: 0x0088ff})  // Back
        ];
        const board = new THREE.Mesh(geometry, materials);
        scene.add(board);
        camera.position.z = 6;

        // 3. Data Polling and Animation
        async function updateScene() {
            try {
                const response = await fetch('http://localhost:7777/data');
                const data = await response.json();

                // Apply Rotations (Radians)
                board.rotation.x = data.pitch;
                board.rotation.z = -data.roll;

                // Update UI Text
                document.getElementById('acc').innerText = `${data.ax}, ${data.ay}, ${data.az}`;
                document.getElementById('gyro').innerText = `${data.gx}, ${data.gy}, ${data.gz}`;
                document.getElementById('p_val').innerText = (data.pitch * 180 / Math.PI).toFixed(2);
                document.getElementById('r_val').innerText = (data.roll * 180 / Math.PI).toFixed(2);

            } catch (err) { console.log("Waiting for server..."); }
        }

        function animate() {
            requestAnimationFrame(animate);
            updateScene();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
